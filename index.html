<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e40af">

    <!-- Firebase SDK (Compat Version for Direct Browser Execution) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <!-- Startup Loader -->
    <div id="app-loader" class="loader-overlay">
        <div class="spinner"></div>
        <p id="loader-status">सिस्टम प्रारंभ हो रहा है...</p>
    </div>

    <!-- Notification Toast -->
    <div id="toast-message" class="toast hidden"></div>

    <!-- Main Navigation & App Shell -->
    <div id="app-content" class="hidden">
        <header class="main-header">
            <h1>विद्यालय प्रबंधन प्रणाली</h1>
            <div class="status-badge" id="network-status">ऑनलाइन</div>
        </header>

        <nav class="nav-tabs">
            <button class="tab-btn active" data-tab="dashboard">डैशबोर्ड</button>
            <button class="tab-btn" data-tab="students">छात्र प्रबंधन</button>
            <button class="tab-btn" data-tab="attendance">उपस्थिति</button>
            <button class="tab-btn" data-tab="notices">सूचना पट्ट</button>
        </nav>

        <main class="container">
            <!-- Dashboard View -->
            <section id="dashboard-tab" class="tab-content active">
                <h2>डैशबोर्ड विवरण</h2>
                <div class="stats-grid">
                    <div class="card"><h3>कुल छात्र</h3><p id="total-students">0</p></div>
                    <div class="card"><h3>आज की उपस्थिति</h3><p id="today-attendance">0%</p></div>
                </div>
            </section>

            <!-- Students View -->
            <section id="students-tab" class="tab-content">
                <h2>छात्र पंजीकरण</h2>
                <form id="add-student-form" class="form-grid">
                    <input type="text" id="student-name" placeholder="छात्र का नाम" required>
                    <input type="text" id="student-class" placeholder="कक्षा (उदा. Class 10)" required>
                    <input type="number" id="student-roll" placeholder="अनुक्रमांक (Roll No)" required>
                    <button type="submit" class="btn-primary">छात्र जोड़ें</button>
                </form>
                
                <h3>छात्रों की सूची</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>अनुक्रमांक</th>
                                <th>नाम</th>
                                <th>कक्षा</th>
                                <th>कार्रवाई</th>
                            </tr>
                        </thead>
                        <tbody id="student-list-body">
                            <!-- Rows added dynamically -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Attendance View -->
            <section id="attendance-tab" class="tab-content">
                <h2>दैनिक उपस्थिति</h2>
                <div id="attendance-list"></div>
            </section>

            <!-- Notices View -->
            <section id="notices-tab" class="tab-content">
                <h2>सूचनाएं</h2>
                <p>यहाँ विद्यालय की मुख्य सूचनाएं प्रदर्शित होंगी।</p>
            </section>
        </main>
    </div>

    <!-- Main App Script -->
    <script src="app.js"></script>
</body>
</html>
        </div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- ================= MODAL ================= -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox"></div>
</div>

<div id="printArea"></div>
<div id="pdfRenderArea" style="position:fixed; left:-9999px; top:0;"></div>

<script src="app.js"></script>
</body>
</html>
